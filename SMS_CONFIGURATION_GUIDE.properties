# SMS Configuration Guide for Flood Alert System
# 
# This file shows all available SMS provider configurations
# Copy the configuration for your chosen provider to application.properties

# =============================================================================
# TWILIO CONFIGURATION (International - Works worldwide including Sri Lanka)
# =============================================================================
# twilio.account-sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
# twilio.auth-token=your_auth_token_here
# twilio.phone-number=+1234567890
# twilio.enabled=true

# =============================================================================
# DIALOG AXIATA CONFIGURATION (Local Sri Lankan Provider - RECOMMENDED)
# =============================================================================
# Dialog Axiata is a local Sri Lankan telecom provider
# Website: https://www.dialog.lk/api
# Supports: Local and international numbers
#
# dialog.api-url=https://api.dialog.lk/sms/send
# dialog.api-key=your_dialog_api_key
# dialog.sender-id=FLOODALERT (or your registered sender ID)
# dialog.enabled=true

# =============================================================================
# MOBITEL CONFIGURATION (Local Sri Lankan Provider)
# =============================================================================
# Mobitel is a local Sri Lankan telecom provider
# Website: https://www.mobitel.lk/api
# Supports: Local and international numbers
#
# mobitel.api-url=https://api.mobitel.lk/sms
# mobitel.username=your_mobitel_username
# mobitel.password=your_mobitel_password
# mobitel.sender-id=ALERT (or your registered sender ID)
# mobitel.enabled=true

# =============================================================================
# EMAIL CONFIGURATION (Already configured)
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================
server.port=8080
server.servlet.context-path=/api

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/flood_alerts
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.hibernate.ddl-auto=update

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging.level.root=INFO
logging.level.Atomic5.demo=DEBUG
logging.level.Atomic5.demo.service.sms=DEBUG

# =============================================================================
# PROVIDER PRIORITY ORDER (When Multiple are Configured)
# =============================================================================
# The system tries providers in this order:
# 1. Dialog Axiata (Local SL - recommended)
# 2. Mobitel (Local SL - recommended)
# 3. Twilio (International - fallback)
#
# The first provider to successfully send will be used
# If that fails, the system automatically falls back to the next provider
