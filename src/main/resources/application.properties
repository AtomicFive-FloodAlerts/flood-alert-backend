spring.application.name=FloodAlerts
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/floodalerts
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/floodalerts

# Optional logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.hibernate.SQL=DEBUG

app.jwt.secret=replace_with_a_long_secret_key_12345678901234567890
app.jwt.expiration=86400000